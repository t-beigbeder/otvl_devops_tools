apiVersion: v1
kind: Pod
metadata:
  name: {{ .Release.Name }}-api
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}-api
spec:
  securityContext:
    runAsUser: {{ .Values.uid }}
    runAsGroup: {{ .Values.uid }}
    fsGroup: {{ .Values.fs_group }}
  containers:
    - name: api
      image: {{ printf "%s-api:%s" .Values.images.site_name .Values.images.versions.api }}
      env:
      - name: OTVL_WEB_CONFIG_PATH
        value: /data/config/config.yml
      command: ["/bin/sh"]
      args: ["-c", "/entrypoint.sh /srv/pkg/otvl_web_server_venv/bin/python -m otvl_web.main"]
      resources:
        {{- toYaml .Values.resources.api | nindent 8 }}
      ports:
        - containerPort: 9090
      livenessProbe:
        periodSeconds: 60
        httpGet:
          path: /api/v2/config
          port: 9090
      readinessProbe:
        periodSeconds: 60
        httpGet:
          path: /api/v2/config
          port: 9090
      volumeMounts:
        - name: api-vol
          mountPath: /data
        - name: api-cmap-vol
          mountPath: /api-cmap
  initContainers:
    - name: init
      image: {{ .Values.images.cabri }}
      env:
        {{- include "podenv-from-env" . | trim | nindent 8 }}
      command:
        - sh
        - /api-cmap/init-data-api.sh
      volumeMounts:
        - name: api-vol
          mountPath: /data
        - name: api-cmap-vol
          mountPath: /api-cmap

  volumes:
    - name: api-vol
      persistentVolumeClaim:
        claimName: {{ .Release.Name }}-pvc
    - name: api-cmap-vol
      configMap:
        name: {{ .Release.Name }}-api-cmap

  restartPolicy: OnFailure
