apiVersion: v1
kind: Pod
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
spec:
  securityContext:
    runAsUser: {{ .Values.uid }}
    runAsGroup: {{ .Values.uid }}
    fsGroup: {{ .Values.fs_group }}
  containers:
    - name: api
      image: {{ .Values.images.cabri }}
      resources:
          {{- toYaml .Values.resources | nindent 10 }}
      ports:
        - containerPort: 3000
      livenessProbe:
        periodSeconds: 60
        httpGet:
          path: /{{ first .Values.urls }}/check
          port: 3000
      readinessProbe:
        periodSeconds: 60
        httpGet:
          path: /{{ first .Values.urls }}/check
          port: 3000
      volumeMounts:
        - name: dss-vol
          mountPath: /data

  volumes:
    - name: dss-vol
      persistentVolumeClaim:
        claimName: {{ .Release.Name }}-pvc

  restartPolicy: OnFailure
